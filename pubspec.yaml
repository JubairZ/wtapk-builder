name: wtapk_builder
description: "Web to APK Maker - Build signed WebView APKs from websites on Android. Powered by Jubair Sensei."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/base.apk
    - assets/signer.jks
